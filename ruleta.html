<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Gratis</title>
<style>
body { font-family: Arial; text-align: center; background: #111; color: #fff; }
button { padding: 10px 20px; font-size: 18px; cursor: pointer; }
#wheel { margin: 20px auto; width: 200px; height: 200px; border-radius: 50%; border: 5px solid white; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<h1>🎰 Ruleta Gratis</h1>

<div id="wheel">🎯</div>

<button onclick="spin()">Girar</button>

<p id="result"></p>

<p>👉 ¿Querés jugar con dinero real?</p>
<button onclick="window.location.href='#'">
Ver mejores casinos
</button>

<script>
function spin() {
    let premios = ["$0", "$10", "$50", "$100", "BONO", "INTENTA DE NUEVO"];
    let resultado = premios[Math.floor(Math.random() * premios.length)];

    document.getElementById("result").innerText = "Resultado: " + resultado;
}
</script>

</body>
</html>
