<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta</title>

<style>
body {
  text-align:center;
  background:#0f172a;
  color:white;
  font-family:Arial;
}

.wheel {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  border: 6px solid gold;
  margin: 30px auto;
  transition: transform 3s ease-out;
  background: conic-gradient(
    red 0deg 60deg,
    green 60deg 120deg,
    red 120deg 180deg,
    green 180deg 240deg,
    red 240deg 300deg,
    gold 300deg 360deg
  );
}

button {
  padding:10px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎡 Ruleta</h1>
<div style="font-size:30px;">⬇️</div>
<p id="coins"></p>

<div class="wheel" id="wheel"></div>

<button onclick="spin()">Girar</button>
<div class="wheel" id="wheel"></div>
<p id="result"></p>

<script>

// 💰 MONEDAS (ARREGLADO)
let coins = parseInt(localStorage.getItem("coins")) || 100;

function update(){
  localStorage.setItem("coins", coins);
  document.getElementById("coins").innerText = "💰 " + coins;
}

update();

// 🎡 SPIN
function spin(){

  if(coins < 10){
    document.getElementById("result").innerText = "😢 Sin monedas";
    return;
  }

  coins -= 10;
  update();

  let deg = Math.floor(Math.random()*360) + 720;
  document.getElementById("wheel").style.transform = "rotate("+deg+"deg)";

  setTimeout(()=>{

    let win = Math.random();

    if(win < 0.1){
      coins += 100;
      document.getElementById("result").innerText = "💥 +100";
    }
    else if(win < 0.3){
      coins += 30;
      document.getElementById("result").innerText = "💰 +30";
    }
    else{
      document.getElementById("result").innerText = "😢 Perdiste";
    }

    update();

  },3000);
}

</script>

</body>
</html>
