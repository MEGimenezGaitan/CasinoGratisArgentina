<!DOCTYPE html>
<html>
<head>
<style>
#wheel {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  margin: 30px auto;
  background: conic-gradient(
    red 0deg 60deg,
    green 60deg 120deg,
    red 120deg 180deg,
    green 180deg 240deg,
    red 240deg 300deg,
    gold 300deg 360deg
  );
  transition: 2s;
}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7127073207220817"
     crossorigin="anonymous"></script>
</head>

<body>

<h1>Ruleta</h1>
<div>⬇️</div>
<div id="wheel"></div>

<button onclick="spin()">Girar</button>
<p id="r"></p>

<script>
let premios=["$0","$10","$50","$100","💥 JACKPOT"];

function spin(){
  let w=document.getElementById("wheel");
  let deg=Math.random()*360+720;
  w.style.transform="rotate("+deg+"deg)";

  setTimeout(()=>{
    let r=premios[Math.floor(Math.random()*premios.length)];
    document.getElementById("r").innerText=r;
  },2000);
}
</script>

</body>
</html>
