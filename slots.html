<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Slots PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: radial-gradient(circle,#020617,#0f172a);
  color: white;
}

/* CONTENEDOR */
.slot-machine {
  background: #111827;
  border-radius: 20px;
  padding: 20px;
  width: 320px;
  margin: 40px auto;
  box-shadow: 0 0 25px rgba(0,0,0,0.8);
}

/* REELS */
.reels {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.reel {
  width: 80px;
  height: 120px;
  overflow: hidden;
  background: black;
  border-radius: 10px;
  border: 3px solid #22c55e;
}

.reel-inner {
  display: flex;
  flex-direction: column;
  transition: transform 1s ease-out;
}

.symbol {
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
}

/* BOTÓN */
button {
  margin-top: 20px;
  padding: 12px 20px;
  background: linear-gradient(45deg,#22c55e,#16a34a);
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
}

/* LUCES */
.win {
  animation: glow 0.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px gold; }
  to { box-shadow: 0 0 30px gold; }
}

</style>
</head>

<body>

<h1>🎰 Slots PRO</h1>
<p id="credits">Créditos: 200</p>

<div class="slot-machine">

  <div class="reels">
    <div class="reel"><div class="reel-inner" id="r1"></div></div>
    <div class="reel"><div class="reel-inner" id="r2"></div></div>
    <div class="reel"><div class="reel-inner" id="r3"></div></div>
  </div>

  <button onclick="spin()">GIRAR</button>

</div>

<p id="result"></p>

<div id="cta" style="display:none;">
  <p>🔥 Probá suerte con dinero real</p>
  <button onclick="window.location.href='redirect.html'">
    🎰 Ir al casino
  </button>
</div>

<script>

let symbols = ["🍒","🍋","🍉","⭐","💎","7️⃣"];
let credits = 200;

function createReel(id){
  let reel = document.getElementById(id);
  reel.innerHTML = "";

  for(let i=0;i<15;i++){
    let div = document.createElement("div");
    div.className = "symbol";
    div.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    reel.appendChild(div);
  }
}

["r1","r2","r3"].forEach(createReel);

function spin(){

  if(credits < 20){
    document.getElementById("result").innerText = "😢 Sin créditos";
    document.getElementById("cta").style.display = "block";
    return;
  }

  credits -= 20;
  document.getElementById("credits").innerText = "Créditos: " + credits;

  let positions = [];

  ["r1","r2","r3"].forEach((id,i)=>{

    let reel = document.getElementById(id);

    createReel(id);

    let pos = Math.floor(Math.random()*10);
    positions.push(pos);

    setTimeout(()=>{
      reel.style.transform = "translateY(-" + (pos * 120) + "px)";
    }, i * 200);
  });

  setTimeout(()=>{

    let r1 = symbols[Math.floor(Math.random()*symbols.length)];
    let r2 = symbols[Math.floor(Math.random()*symbols.length)];
    let r3 = symbols[Math.floor(Math.random()*symbols.length)];

    let result = "";

    if(r1 === r2 && r2 === r3){
      credits += 150;
      result = "💥 JACKPOT!";
      document.querySelector(".slot-machine").classList.add("win");
    }
    else if(r1 === r2 || r2 === r3){
      credits += 40;
      result = "💰 Ganaste";
    }
    else{
      result = "😢 Intentalo";
    }

    document.getElementById("result").innerText = result;
    document.getElementById("credits").innerText = "Créditos: " + credits;

    setTimeout(()=>{
      document.querySelector(".slot-machine").classList.remove("win");
    },1000);

    if(credits < 50){
      document.getElementById("cta").style.display = "block";
    }

  },2000);

}

</script>

</body>
</html>
