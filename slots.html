<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Slots Gratis</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

.slot {
  display: flex;
  justify-content: center;
  margin: 30px;
}

.reel {
  width: 80px;
  height: 80px;
  background: #1e293b;
  margin: 5px;
  font-size: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  border: 2px solid #334155;
  transition: 0.2s;
}

.spin {
  animation: spin 0.5s infinite;
}

@keyframes spin {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

button {
  padding: 12px;
  background: linear-gradient(45deg,#22c55e,#16a34a);
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

</style>
</head>

<body>

<h1>🎰 Slot Gratis</h1>
<p id="creditos">Créditos: 100</p>

<div class="slot">
  <div class="reel" id="r1">🍒</div>
  <div class="reel" id="r2">🍋</div>
  <div class="reel" id="r3">🍊</div>
</div>

<button onclick="spin()">Girar</button>

<p id="resultado"></p>

<div id="cta" style="display:none;">
  <p>🔥 Probá suerte con dinero real</p>
  <button onclick="window.location.href='redirect.html'">
    🎰 Ir al casino
  </button>
</div>

<script>

let simbolos = ["🍒","🍋","🍊","⭐","💎"];
let creditos = 100;

function getRandom(){
  return simbolos[Math.floor(Math.random()*simbolos.length)];
}

function spin(){

  if(creditos <= 0){
    document.getElementById("resultado").innerText = "😢 Sin créditos...";
    document.getElementById("cta").style.display = "block";
    return;
  }

  creditos -= 10;
  document.getElementById("creditos").innerText = "Créditos: " + creditos;

  let reels = ["r1","r2","r3"];

  reels.forEach(id => {
    document.getElementById(id).classList.add("spin");
  });

  setTimeout(()=>{

    let r1 = getRandom();
    let r2 = getRandom();
    let r3 = getRandom();

    // 💥 efecto casi ganar
    if(Math.random() < 0.3){
      r1 = "💎";
      r2 = "💎";
      r3 = simbolos[Math.floor(Math.random()*simbolos.length)];
    }

    document.getElementById("r1").innerText = r1;
    document.getElementById("r2").innerText = r2;
    document.getElementById("r3").innerText = r3;

    reels.forEach(id => {
      document.getElementById(id).classList.remove("spin");
    });

    if(r1 === r2 && r2 === r3){
      document.getElementById("resultado").innerText = "💥 JACKPOT!";
      creditos += 100;
    }
    else if(r1 === r2 || r2 === r3){
      document.getElementById("resultado").innerText = "💰 Ganaste algo!";
      creditos += 30;
    }
    else{
      document.getElementById("resultado").innerText = "😢 Intentalo de nuevo";
    }

    document.getElementById("creditos").innerText = "Créditos: " + creditos;

    // CTA inteligente
    if(creditos <= 20){
      document.getElementById("cta").style.display = "block";
    }

  }, 1200);
}

</script>

</body>
</html>
