<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Slots Gratis PRO</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: radial-gradient(circle, #020617, #0f172a);
  color: white;
}

h1 {
  margin-top: 20px;
}

.slot {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 30px;
}

.reel {
  width: 90px;
  height: 90px;
  background: #1e293b;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 35px;
  border: 3px solid #22c55e;
  box-shadow: 0 0 10px rgba(34,197,94,0.5);
}

button {
  padding: 12px 25px;
  background: linear-gradient(45deg, #22c55e, #16a34a);
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  font-weight: bold;
  font-size: 16px;
}

#result {
  margin-top: 20px;
  font-size: 20px;
}

#credits {
  margin-top: 10px;
  font-size: 18px;
}

</style>
</head>

<body>

<h1>🎰 Slots PRO</h1>

<p id="credits">Créditos: $500</p>

<div class="slot">
  <div class="reel" id="r1">❓</div>
  <div class="reel" id="r2">❓</div>
  <div class="reel" id="r3">❓</div>
</div>

<button onclick="spin()">Girar ($50)</button>

<p id="result"></p>

<div id="cta" style="display:none;">
  <p>👉 ¿Querés jugar con dinero real?</p>
  <a href="casinos.html">
    <button>Ver mejores casinos</button>
  </a>
</div>

<script>

let simbolos = ["🍒","🍋","🍉","⭐","💎","7️⃣"];
let creditos = 500;

function actualizarCreditos() {
  document.getElementById("credits").innerText = "Créditos: $" + creditos;
}

function randomSimbolo() {
  return simbolos[Math.floor(Math.random() * simbolos.length)];
}

function spin() {

  if (creditos < 50) {
    document.getElementById("result").innerText = "Sin créditos 😢";
    return;
  }

  creditos -= 50;
  actualizarCreditos();

  document.getElementById("cta").style.display = "none";
  document.getElementById("result").innerText = "";

  let r1 = document.getElementById("r1");
  let r2 = document.getElementById("r2");
  let r3 = document.getElementById("r3");

  let vueltas = 15;
  let i = 0;

  let intervalo = setInterval(() => {
    r1.innerText = randomSimbolo();
    r2.innerText = randomSimbolo();
    r3.innerText = randomSimbolo();
    i++;

    if (i >= vueltas) {
      clearInterval(intervalo);

      let s1 = randomSimbolo();
      let s2 = randomSimbolo();
      let s3 = randomSimbolo();

      r1.innerText = s1;
      r2.innerText = s2;
      r3.innerText = s3;

      evaluar(s1, s2, s3);
    }

  }, 80);
}

function evaluar(a, b, c) {
  let resultado = "";

  if (a === b && b === c) {
    if (a === "7️⃣") {
      creditos += 1000;
      resultado = "💥 JACKPOT +$1000";
    } else {
      creditos += 200;
      resultado = "🎉 Ganaste +$200";
    }
  } else if (a === b || b === c || a === c) {
    creditos += 50;
    resultado = "👍 Recuperaste +$50";
  } else {
    resultado = "😢 Perdiste";
  }

  actualizarCreditos();
  document.getElementById("result").innerText = resultado;
  document.getElementById("cta").style.display = "block";
}

// inicial
actualizarCreditos();

</script>

</body>
</html>
