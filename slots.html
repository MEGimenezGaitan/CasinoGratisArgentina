<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Slots Gratis</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

h1 {
  margin-top: 20px;
}

.slot {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 30px;
}

.reel {
  width: 80px;
  height: 80px;
  background: #1e293b;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  border: 2px solid white;
}

button {
  padding: 10px 20px;
  background: linear-gradient(45deg, #22c55e, #16a34a);
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}

#result {
  margin-top: 20px;
  font-size: 18px;
}

</style>
</head>

<body>

<h1>🎰 Slots Gratis</h1>
<p>Probá suerte en este tragamonedas</p>

<div class="slot">
  <div class="reel" id="r1">❓</div>
  <div class="reel" id="r2">❓</div>
  <div class="reel" id="r3">❓</div>
</div>

<button onclick="spin()">Girar</button>

<p id="result"></p>

<div id="cta" style="display:none;">
  <p>👉 ¿Querés jugar con dinero real?</p>
  <a href="casinos.html">
    <button>Ver mejores casinos</button>
  </a>
</div>

<script>

let simbolos = ["🍒","🍋","🍉","⭐","💎","7️⃣"];

function randomSimbolo() {
  return simbolos[Math.floor(Math.random() * simbolos.length)];
}

function spin() {
  document.getElementById("cta").style.display = "none";
  document.getElementById("result").innerText = "";

  let r1 = document.getElementById("r1");
  let r2 = document.getElementById("r2");
  let r3 = document.getElementById("r3");

  let vueltas = 10;
  let i = 0;

  let intervalo = setInterval(() => {
    r1.innerText = randomSimbolo();
    r2.innerText = randomSimbolo();
    r3.innerText = randomSimbolo();
    i++;

    if (i >= vueltas) {
      clearInterval(intervalo);

      let s1 = randomSimbolo();
      let s2 = randomSimbolo();
      let s3 = randomSimbolo();

      r1.innerText = s1;
      r2.innerText = s2;
      r3.innerText = s3;

      evaluar(s1, s2, s3);
    }

  }, 100);
}

function evaluar(a, b, c) {
  let resultado = "";

  if (a === b && b === c) {
    if (a === "7️⃣") {
      resultado = "💥 JACKPOT $1000";
    } else {
      resultado = "🎉 Ganaste $200";
    }
  } else if (a === b || b === c || a === c) {
    resultado = "👍 Ganaste $50";
  } else {
    resultado = "😢 Intenta de nuevo";
  }

  document.getElementById("result").innerText = resultado;
  document.getElementById("cta").style.display = "block";
}

</script>

</body>
</html>
