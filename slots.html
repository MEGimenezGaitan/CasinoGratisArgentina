<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Slots PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: radial-gradient(circle,#020617,#0f172a);
  color: white;
}

/* SLOT MACHINE */
.slot-machine {
  background: linear-gradient(180deg,#1e293b,#020617);
  border-radius: 25px;
  padding: 20px;
  width: 340px;
  margin: 40px auto;
  box-shadow: 0 0 30px black;
  border: 4px solid gold;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px gold; }
  to { box-shadow: 0 0 30px orange; }
}

/* TOP */
.machine-top {
  background: linear-gradient(90deg,#f59e0b,#facc15);
  padding: 10px;
  border-radius: 15px;
  font-weight: bold;
  color: black;
  margin-bottom: 10px;
}

/* BODY */
.machine-body {
  background: black;
  padding: 15px;
  border-radius: 15px;
}

/* REELS */
.reels {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.reel {
  width: 90px;
  height: 130px;
  overflow: hidden;
  background: white;
  border-radius: 10px;
  border: 3px solid #ccc;
}

.reel-inner {
  display: flex;
  flex-direction: column;
  transition: transform 0.6s cubic-bezier(.17,.67,.83,.67);
}

.symbol {
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 55px;
}

/* CONTROLES */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

/* BOTONES */
button {
  margin-top: 20px;
  padding: 12px;
  background: #22c55e;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.spin-btn {
  width: 150px;
  background: red;
  font-size: 18px;
}

.real-btn {
  background: gold;
  color: black;
}

/* 🕹️ PALANCA */
.lever {
  position: relative;
  width: 20px;
  height: 100px;
  cursor: pointer;
}

.lever-stick {
  width: 6px;
  height: 80px;
  background: silver;
  margin: auto;
  border-radius: 5px;
  transition: transform 0.3s;
}

.lever-ball {
  width: 25px;
  height: 25px;
  background: red;
  border-radius: 50%;
  position: absolute;
  bottom: 0;
  left: -3px;
  transition: transform 0.3s;
}

.lever.pull .lever-stick {
  transform: rotate(25deg);
  transform-origin: top;
}

.lever.pull .lever-ball {
  transform: translateY(20px);
}

/* EFECTO GANAR */
.flash {
  animation: flash 0.3s 3;
}

@keyframes flash {
  50% { background: gold; }
}

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: black;
  border: 2px solid gold;
  padding: 25px;
  display: none;
  z-index: 999;
  border-radius: 10px;
}

/* BOTÓN FIJO */
.fixed-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🎰 Slots</h1>
<p id="credits"></p>

<div class="slot-machine">

  <div class="machine-top">
    🎰 SpinGenio
  </div>

  <div class="machine-body">
    <div class="reels">
      <div class="reel"><div class="reel-inner" id="r1"></div></div>
      <div class="reel"><div class="reel-inner" id="r2"></div></div>
      <div class="reel"><div class="reel-inner" id="r3"></div></div>
    </div>
  </div>

  <div class="controls">
    <button class="spin-btn" onclick="spin()">GIRAR</button>

    <div class="lever" onclick="spin()">
      <div class="lever-stick"></div>
      <div class="lever-ball"></div>
    </div>
  </div>

</div>

<p id="result"></p>

<!-- CTA -->
<div id="cta" style="display:none;">
  <p>🔥 Estás a un paso de ganar dinero real</p>
  <button class="real-btn" onclick="goReal()">💰 PROBAR AHORA</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h2>🎉 GANASTE</h2>
  <p>🔥 Este juego también paga dinero real</p>
  <button class="real-btn" onclick="goReal()">💰 JUGAR POR DINERO REAL</button>
</div>

<!-- BOTÓN FIJO -->
<div class="fixed-btn" onclick="goReal()">💰</div>

<!-- sonidos -->
<audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/1998/1998-preview.mp3"></audio>

<script>

// 💰 MONEDAS
let credits = parseInt(localStorage.getItem("coins")) || 100;

function updateCoins(){
  localStorage.setItem("coins", credits);
  document.getElementById("credits").innerText = "💰 " + credits;
}

updateCoins();

// 🎰 REELS
let symbols = ["🍒","🍋","🍉","⭐","💎","7️⃣"];

function createReel(id){
  let reel = document.getElementById(id);
  reel.innerHTML = "";

  for(let i=0;i<15;i++){
    let div = document.createElement("div");
    div.className = "symbol";
    div.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    reel.appendChild(div);
  }
}

["r1","r2","r3"].forEach(createReel);

// 🎰 SPIN
function spin(){

  document.getElementById("spinSound").play();

  // 🎰 PALANCA
  let lever = document.querySelector(".lever");
  if(lever){
    lever.classList.add("pull");
    setTimeout(()=> lever.classList.remove("pull"), 300);
  }

  if(credits < 20){
    document.getElementById("result").innerText = "😢 Sin monedas";
    document.getElementById("cta").style.display = "block";
    return;
  }

  credits -= 20;
  updateCoins();

  ["r1","r2","r3"].forEach((id,i)=>{
    let reel = document.getElementById(id);
    createReel(id);

    let pos = Math.floor(Math.random()*10);

    setTimeout(()=>{
      reel.style.transform = "translateY(-" + (pos * 130) + "px)";
    }, i * 200);
  });

  setTimeout(()=>{

    let r1 = symbols[Math.floor(Math.random()*symbols.length)];
    let r2 = symbols[Math.floor(Math.random()*symbols.length)];
    let r3 = symbols[Math.floor(Math.random()*symbols.length)];

    if(Math.random() < 0.5){
      r1 = "💎";
      r2 = "💎";
    }

    let result = "";

    if(r1 === r2 && r2 === r3){
      credits += 150;
      result = "💥 JACKPOT +150";
      document.getElementById("winSound").play();
      document.body.classList.add("flash");
      setTimeout(()=> document.body.classList.remove("flash"),1000);
      showPopup();
    }
    else if(r1 === r2 || r2 === r3){
      credits += 40;
      result = "💰 +40";
    }
    else{
      result = "😢 Casi ganas...";
      if(Math.random() < 0.3){
        document.getElementById("cta").style.display = "block";
      }
    }

    updateCoins();
    document.getElementById("result").innerText = result;

  },2000);
}

// 💰 CTA
function showPopup(){
  document.getElementById("popup").style.display = "block";
}

function goReal(){
  window.location.href = "redirect.html";
}

</script>

</body>
</html>
