<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rasca y Gana</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.card {
  width: 100px;
  height: 100px;
  background: gray;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
}
</style>
</head>
<body>

<h1>🎟️ Rasca y Gana</h1>
<p>Descubrí si ganaste</p>

<div class="grid" id="grid"></div>

<p id="resultado"></p>

<p>👉 ¿Querés jugar con dinero real?</p>
<button onclick="window.location.href='#'">
Ver mejores casinos
</button>

<script>
let premios = ["$0", "$10", "$50", "$100", "💥 JACKPOT"];
let ganador = premios[Math.floor(Math.random() * premios.length)];

let grid = document.getElementById("grid");

for (let i = 0; i < 9; i++) {
  let div = document.createElement("div");
  div.className = "card";
  div.innerText = "?";

  div.onclick = function () {
    this.innerText = ganador;
    document.getElementById("resultado").innerText = "Resultado: " + ganador;
  };

  grid.appendChild(div);
}
</script>

</body>
</html>
