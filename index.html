<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Gratis Argentina</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle,#020617,#0f172a);
  color: white;
  text-align: center;
}

.coins {
  position: fixed;
  top: 10px;
  right: 20px;
  background: #111827;
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
}

.hero {
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
}

.cta-btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: linear-gradient(45deg,#22c55e,#16a34a);
  border: none;
  color: white;
  font-size: 20px;
  border-radius: 10px;
  cursor: pointer;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.section {
  padding: 40px;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 200px;
}

.real-btn {
  background: gold;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="coins" id="coins">💰 100</div>

<div class="hero">
  <h1>🎰 CASINO GRATIS ARGENTINA</h1>
  <p>💸 Te regalamos 1000 monedas GRATIS todos los días</p>
  <p>Jugá sin riesgo y probá suerte como en un casino real</p>

  <!-- 👀 VISITAS -->
  <p id="visits">👀 Cargando visitas...</p>

  <a href="slots.html">
    <button class="cta-btn">🎰 JUGAR GRATIS AHORA</button>
  </a>

  <br><br>

  <button class="real-btn" onclick="window.location.href='redirect.html'">
    💰 GANAR DINERO REAL AHORA
  </button>

  <div style="margin-top:20px;">
    <p id="players">🔥 120 personas jugando ahora</p>
    <p style="opacity:0.7;">💰 Último retiro: $250 hace 2 min</p>
  </div>
</div>

<div class="section">
  <h2>🎮 Juegos</h2>

  <div class="cards">
    <div class="card">
      <h3>Slots</h3>
      <a href="slots.html"><button>Jugar</button></a>
    </div>

    <div class="card">
      <h3>Ruleta</h3>
      <a href="ruleta.html"><button>Jugar</button></a>
    </div>

    <div class="card">
      <h3>Rasca</h3>
      <a href="rasca.html"><button>Jugar</button></a>
    </div>
  </div>
</div>

<footer style="padding:20px;">
  <p>+18 | Juego responsable</p>
</footer>

<script>

// 💰 MONEDAS
let coins = localStorage.getItem("coins");

if(!coins){
  coins = 100;
  localStorage.setItem("coins", coins);
}

document.getElementById("coins").innerText = "💰 " + coins;

// 👥 JUGADORES DINÁMICOS
setInterval(() => {
  let n = Math.floor(Math.random() * 50) + 100;
  document.getElementById("players").innerText = "🔥 " + n + " personas jugando ahora";
}, 3000);

// 👀 CONTADOR REAL
fetch("https://api.countapi.xyz/hit/casino-gratis-argentina/visits")
  .then(res => res.json())
  .then(data => {
    document.getElementById("visits").innerText =
      "👀 Visitas totales: " + data.value;
  });

</script>

</body>
</html>
