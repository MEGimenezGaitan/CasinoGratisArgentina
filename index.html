<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Gratis Argentina</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle,#020617,#0f172a);
  color: white;
  text-align: center;
}

/* HERO */
.hero {
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  opacity: 0.8;
}

/* BOTÓN */
.cta-btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: linear-gradient(45deg,#22c55e,#16a34a);
  border: none;
  color: white;
  font-size: 20px;
  border-radius: 10px;
  cursor: pointer;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* MONEDAS */
.coins {
  position: fixed;
  top: 10px;
  right: 20px;
  background: #111827;
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
}

/* CARDS */
.section {
  padding: 40px;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 200px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #22c55e;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- MONEDAS -->
<div class="coins" id="coins">💰 100</div>

<!-- HERO -->
<div class="hero">
  <h1>🎰 Ganá monedas jugando gratis</h1>
  <p>+1000 jugadores ya están jugando</p>

  <a href="slots.html">
    <button class="cta-btn">🎰 Jugar ahora</button>
  </a>
</div>

<!-- JUEGOS -->
<div class="section">
  <h2>🎮 Juegos</h2>

  <div class="cards">
    <div class="card">
      <h3>Slots</h3>
      <a href="slots.html"><button>Jugar</button></a>
    </div>

    <div class="card">
      <h3>Ruleta</h3>
      <a href="ruleta.html"><button>Jugar</button></a>
    </div>

    <div class="card">
      <h3>Rasca</h3>
      <a href="rasca.html"><button>Jugar</button></a>
    </div>
  </div>
</div>

<!-- CASINOS -->
<div class="section">
  <h2>🏆 Mejores Casinos</h2>

  <div class="cards">
    <div class="card" style="border:2px solid gold;">
      <h3>🥇 TOP</h3>
      <p>Bono hasta $100.000</p>
      <button onclick="window.location.href='redirect.html'">
        Jugar real
      </button>
    </div>
  </div>
</div>

<script>

// 💰 SISTEMA DE MONEDAS (GLOBAL)
let coins = localStorage.getItem("coins");

if(!coins){
  coins = 100;
  localStorage.setItem("coins", coins);
}

document.getElementById("coins").innerText = "💰 " + coins;

</script>

</body>
</html>
